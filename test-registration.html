<!DOCTYPE html>
<html>
<head>
    <title>Test Registration Process</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 300px; padding: 8px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        .result { margin-top: 20px; padding: 10px; border: 1px solid #ccc; background: #f9f9f9; }
    </style>
</head>
<body>
    <h1>Test Registration Process</h1>
    
    <form id="testForm">
        <div class="form-group">
            <label>First Name:</label>
            <input type="text" id="firstName" value="Test" required>
        </div>
        
        <div class="form-group">
            <label>Last Name:</label>
            <input type="text" id="lastName" value="User" required>
        </div>
        
        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="email" value="test@example.com" required>
        </div>
        
        <div class="form-group">
            <label>Profile Image:</label>
            <input type="file" id="profileImage" accept="image/*">
        </div>
        
        <button type="submit">Register Member</button>
    </form>
    
    <div id="result" class="result" style="display: none;"></div>
    
    <script>
        document.getElementById('testForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = 'Processing...';
            
            try {
                const formData = new FormData();
                formData.append('firstName', document.getElementById('firstName').value);
                formData.append('lastName', document.getElementById('lastName').value);
                formData.append('email', document.getElementById('email').value);
                
                const fileInput = document.getElementById('profileImage');
                if (fileInput.files[0]) {
                    console.log('File selected:', fileInput.files[0]);
                    
                    // Test the upload process
                    try {
                        const { ensureBucketExists, uploadImageToSupabase } = await import('./lib/storage-utils.ts');
                        
                        console.log('Checking bucket...');
                        const bucketReady = await ensureBucketExists();
                        console.log('Bucket ready:', bucketReady);
                        
                        if (bucketReady) {
                            console.log('Uploading image...');
                            const uploadResult = await uploadImageToSupabase(
                                fileInput.files[0],
                                'member-photos',
                                'profiles'
                            );
                            console.log('Upload result:', uploadResult);
                            
                            if (uploadResult) {
                                formData.append('profileImage', uploadResult.url);
                                resultDiv.innerHTML += '<br>✅ Image uploaded: ' + uploadResult.url;
                            } else {
                                formData.append('profileImage', `local:${fileInput.files[0].name}`);
                                resultDiv.innerHTML += '<br>❌ Image upload failed, using local reference';
                            }
                        } else {
                            formData.append('profileImage', `local:${fileInput.files[0].name}`);
                            resultDiv.innerHTML += '<br>❌ Bucket not ready, using local reference';
                        }
                    } catch (error) {
                        console.error('Upload error:', error);
                        formData.append('profileImage', `local:${fileInput.files[0].name}`);
                        resultDiv.innerHTML += '<br>❌ Upload error: ' + error.message;
                    }
                } else {
                    formData.append('profileImage', '');
                }
                
                // Submit to API
                console.log('Submitting to API...');
                const response = await fetch('/api/members', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                console.log('API response:', data);
                
                if (data.success) {
                    resultDiv.innerHTML += '<br>✅ Member registered successfully!';
                    resultDiv.innerHTML += '<br>Member ID: ' + data.member.id;
                    resultDiv.innerHTML += '<br>Profile Image: ' + (data.member.profileImage || 'None');
                } else {
                    resultDiv.innerHTML += '<br>❌ Registration failed: ' + (data.error || 'Unknown error');
                }
                
            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML += '<br>❌ Error: ' + error.message;
            }
        });
    </script>
</body>
</html>
